name: Lint and Test

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check couchpotato/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: libs
